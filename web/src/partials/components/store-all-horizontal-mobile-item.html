<article class="store-all-horizontal-mobile-item">
    <div class="store-all-horizontal-mobile-card">
        <div class="store-all-horizontal-mobile-top">
            <div class="store-all-horizontal-mobile-avatar-box">
                <img class="store-all-horizontal-mobile-avatar" src="{{store_avatar}}" alt="store avatar" />
            </div>
            <div class="store-all-horizontal-mobile-main">
                <div class="store-all-horizontal-mobile-title-row">
                    <span class="store-all-horizontal-mobile-ad">{{ad_text}}</span>
                    <a href="{{store_link}}" target="_self" class="store-all-horizontal-mobile-title">
                        {{store_name}}
                    </a>
                </div>
                <p class="store-all-horizontal-mobile-desc">
                    {{store_subtitle}}
                </p>
            </div>
        </div>
        <div class="store-all-horizontal-mobile-meta">
            <!-- @include ./rating-with-count.html {"score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
            <div class="store-all-horizontal-mobile-brand">
                <img class="store-all-horizontal-mobile-meta-icon" src="image/brand.png" alt="brand icon" />
                <span class="store-all-horizontal-mobile-brand-text">{{brand_name}}</span>
            </div>
            <div class="store-all-horizontal-mobile-service">
                <img class="store-all-horizontal-mobile-meta-icon" src="image/service.png" alt="service icon" />
                <span class="store-all-horizontal-mobile-service-text">{{service_name}}</span>
            </div>
        </div>
        <div class="store-all-horizontal-mobile-tags item-tag-box">
            {{item_tags}}
        </div>
        <!-- @include ./item-like-button.html {"like_class":"icon-aixin store-all-horizontal-mobile-like","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    </div>
</article>
