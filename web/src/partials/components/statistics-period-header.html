<div class="{{header_class}}">
  <div class="title-section">
    <div class="red-indicator"></div>
    <span class="section-title">{{title_text}}</span>
  </div>
  <div class="tabs-container" data-chart="{{chart_type}}">
    <div class="tab-item active" data-period="7D" role="button" tabindex="0" aria-pressed="true">
      <div class="ink-bar"></div>
      <span class="tab-text">7D</span>
    </div>
    <div class="tab-item" data-period="14D" role="button" tabindex="0" aria-pressed="false">
      <div class="ink-bar"></div>
      <span class="tab-text">14D</span>
    </div>
    <div class="tab-item" data-period="30D" role="button" tabindex="0" aria-pressed="false">
      <div class="ink-bar"></div>
      <span class="tab-text">30D</span>
    </div>
  </div>
</div>
