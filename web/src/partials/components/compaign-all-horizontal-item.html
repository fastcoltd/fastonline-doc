<div class="compaign-item figma-compaign-horizontal-item">
    <img class="compaign-item-icon" src="image/best-item-cover.png" />
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    <div class="compaign-item-content">
        <div class="compaign-horizontal-head">
            <a href="{{item_link}}" target="_self" class="item-title-box">
                <span class="compaign-item-ad-mark">{{ad_text}}</span>
                <h4 class="item-title">{{item_title}}</h4>
            </a>
        </div>
        <div class="compaign-horizontal-stats" aria-label="Campaign statistics">
            <p class="compaign-horizontal-stat">
                <span class="compaign-item-brand-text">{{items_label}}</span>
                <span class="compaign-item-brand">{{items_value}}</span>
            </p>
            <p class="compaign-horizontal-stat">
                <span class="compaign-item-brand-text">{{sales_label}}</span>
                <span class="compaign-item-brand">{{sales_value}}</span>
            </p>
            <p class="compaign-horizontal-stat">
                <span class="compaign-item-brand-text">{{orders_label}}</span>
                <span class="compaign-item-brand">{{orders_value}}</span>
            </p>
            <p class="compaign-horizontal-stat">
                <span class="compaign-item-brand-text">{{favorites_label}}</span>
                <span class="compaign-item-brand">{{favorites_value}}</span>
            </p>
        </div>
        <div class="compaign-item-products-box">
            <span class="compaign-item-products-text">{{products_label}}</span>
            <p class="compaign-item-products">{{products_text}}</p>
        </div>
        <div class="item-tag-box">
            {{item_tags}}
        </div>
    </div>
</div>
