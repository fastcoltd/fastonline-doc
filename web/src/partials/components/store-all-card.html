<article class="store-all-card {{store_card_state_class}}">
    <figure>
        <img src="{{avatar_src}}" alt="Store avatar" />
    </figure>
    <header>
        <div data-role="title">
            <span data-role="mark">{{mark_text}}</span>
            <h2><a href="{{store_link}}" target="_self">{{store_name}}</a></h2>
        </div>
        <p data-role="summary">{{store_summary}}</p>
    </header>
    <section>
        <div data-role="rating">
            <!-- @include ./rating-with-count.html {"score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
        </div>
        <p data-role="detail">{{store_detail}}</p>
        <dl>
            <div data-field="brand">
                <dt><span>Brand：</span><img src="image/brand.png" alt="Brand" /></dt>
                <dd>{{brand_name}}</dd>
            </div>
            <div data-field="service">
                <dt><span>Service：</span><img src="image/service.png" alt="Service" /></dt>
                <dd>{{service_name}}</dd>
            </div>
        </dl>
    </section>
    <nav aria-label="Store tags">
        {{store_tags}}
    </nav>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
