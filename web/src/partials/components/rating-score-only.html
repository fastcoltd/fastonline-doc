<div class="item-star-box item-star-box-pc {{rating_class}}" data-rating-selectable="{{rating_selectable}}" data-rating-value="{{score}}">
    <div class="star-bg" {{rating_attrs}}>
        <div class="stars-outer">
            <div class="stars-inner" style="--star-fill: {{score_fill}};"></div>
        </div>
    </div>
    <p>{{score}}</p>
</div>
