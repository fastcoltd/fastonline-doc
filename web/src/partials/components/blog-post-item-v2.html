<article class="blog-post-item-v2 {{card_extra_class}}">
    <img src="{{cover_image}}" alt="{{cover_alt}}" />
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    <div class="blog-post-item-v2-content">
        <a href="{{item_link}}" target="_self">
            <h3>{{item_title}}</h3>
        </a>
        <p>{{item_desc}}</p>
        <div class="blog-post-item-v2-meta-row">
            <a href="{{brand_link}}" target="_self">
                <img src="{{brand_icon}}" alt="{{brand_alt}}" />
                <span>{{brand_name}}</span>
            </a>
            <div class="blog-post-item-v2-stats-wrap">
                <div class="blog-post-item-v2-rate">
                    <div class="blog-post-item-v2-rate-pc item-star-box-pc">
                        <span aria-label="rating 5.0">
                            <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                            <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                            <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                            <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                            <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                        </span>
                        <span>{{score_text}}</span>
                    </div>
                    <!-- @include ./rating-with-count-mobile.html {"score":"{{score_text}}","recommend":""} -->
                </div>
                <div class="blog-post-item-v2-attr"><span>Reads:</span><span
                       >{{reads}}</span></div>
                <div class="blog-post-item-v2-attr"><span
                       >Comments:</span><span
                       >{{comments}}</span></div>
                <div class="blog-post-item-v2-attr"><span>Paid:</span><span
                       >{{paid}}</span></div>
            </div>
        </div>
        <div class="blog-post-item-v2-footer-row">
            <div class="blog-post-item-v2-tags">
                {{item_tags}}
            </div>
            <a href="{{item_link}}" target="_self">Read All</a>
        </div>
    </div>
</article>
