<article class="blog-post-item-v2 {{card_extra_class}}">
    <img class="blog-post-item-v2-cover" src="{{cover_image}}" alt="{{cover_alt}}" />
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    <div class="blog-post-item-v2-content">
        <a href="{{item_link}}" class="blog-post-item-v2-title-link" target="_self">
            <h3 class="blog-post-item-v2-title">{{item_title}}</h3>
        </a>
        <p class="blog-post-item-v2-desc">{{item_desc}}</p>
        <div class="blog-post-item-v2-meta-row">
            <a class="blog-post-item-v2-brand" href="{{brand_link}}" target="_self">
                <img class="blog-post-item-v2-brand-icon" src="{{brand_icon}}" alt="{{brand_alt}}" />
                <span class="blog-post-item-v2-brand-name">{{brand_name}}</span>
            </a>
            <div class="blog-post-item-v2-stats-wrap">
                <div class="blog-post-item-v2-rate">
                    <span class="blog-post-item-v2-stars" aria-label="rating 5.0">
                        <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                        <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                        <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                        <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                        <img src="image/blog/blog-post-item-v2-star-fill.svg" alt="" />
                    </span>
                    <span class="blog-post-item-v2-score">{{score_text}}</span>
                </div>
                <div class="blog-post-item-v2-attr"><span class="blog-post-item-v2-attr-label">Reads:</span><span
                        class="blog-post-item-v2-attr-value">{{reads}}</span></div>
                <div class="blog-post-item-v2-attr"><span
                        class="blog-post-item-v2-attr-label">Comments:</span><span
                        class="blog-post-item-v2-attr-value">{{comments}}</span></div>
                <div class="blog-post-item-v2-attr"><span class="blog-post-item-v2-attr-label">Paid:</span><span
                        class="blog-post-item-v2-attr-value blog-post-item-v2-attr-value-bold">{{paid}}</span></div>
            </div>
        </div>
        <div class="blog-post-item-v2-footer-row">
            <div class="blog-post-item-v2-tags">
                {{item_tags}}
            </div>
            <a class="blog-post-item-v2-read-all" href="{{item_link}}" target="_self">Read All</a>
        </div>
    </div>
</article>
