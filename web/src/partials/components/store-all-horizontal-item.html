<div class="store-item figma-store-horizontal-item">
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    <div class="store-item-user-box">
        <img class="store-item-icon" src="{{store_avatar}}" />
        <div class="store-item-name-box">
            <a href="{{store_link}}" target="_self" class="item-title-box">
                <p class="item-title">{{store_name}}</p>
            </a>
            <div class="item-desc-box">
                <p class="item-desc">{{store_subtitle}}</p>
            </div>
            <!-- @include ./rating-with-count.html {"score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
        </div>
    </div>
    <div class="store-item-content">
        <div class="store-item-detail-box">
            <p class="store-item-detail">{{store_description}}</p>
        </div>
        <div class="store-item-brand-service-box">
            <div class="item-brand-box">
                <p class="item-brand-text">Brand：</p>
                <p class="item-brand" style="color: {{brand_color}};">{{brand_name}}</p>
            </div>
            <div class="item-service-box">
                <p class="item-service-text">Service：</p>
                <p class="item-service">{{service_name}}</p>
            </div>
        </div>
    </div>
    <div class="item-tag-box">
        {{item_tags}}
    </div>
</div>
