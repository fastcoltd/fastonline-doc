<div class="search-card {{card_class}} search-card-fourth-item-desktop">
  <div class="item-title-wrapper">
    <div class="search-store-title-group">
      <div class="item-title">{{item_title}}</div>
      <p>{{item_subtitle}}</p>
    </div>
    <!-- @include ./item-like-button.html {"like_class":"{{like_class}}","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"{{like_alt}}","aria_label":"{{aria_label}}","aria_pressed":"{{aria_pressed}}"} -->
  </div>
  <div class="search-card-content">
    <img src="{{image_src}}" alt="{{image_alt}}">
    <div class="card-content">
      <!-- @include ./rating-with-count.html {"score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
      <div class="best-items-item-middle-box search-store-meta">
        <div class="item-brand-box">
          <p class="item-brand-text">{{brand_label}}</p>
          <p class="item-brand" style="color: {{brand_color}};">{{brand_name}}</p>
        </div>
        <div class="item-service-box">
          <p class="item-service-text">{{service_label}}</p>
          <p class="item-service">{{service_name}}</p>
        </div>
      </div>
      <p>{{summary_text}}</p>
      <div class="item-tag-box">
        {{item_tags}}
      </div>
    </div>
  </div>
  <div class="status-badge status-badge1" style="{{status_badge_style}}">
    <p>{{status_text}}</p>
  </div>
</div>
<div class="search-card {{card_class}} search-card-fourth-item-mobile">
  <div class="store-all-mobile-horizontal-page">
    <div class="items-container-horizontal">
      <div class="store-all-horizontal-items-pager">
        <!-- @include ./store-all-horizontal-mobile-item.html {"like":"{{like}}","like_icon":"{{like_icon}}","aria_pressed":"{{aria_pressed}}"} -->
      </div>
    </div>
  </div>
</div>
