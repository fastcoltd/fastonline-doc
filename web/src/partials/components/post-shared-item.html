<div class="post-item {{post_item_extra_class}}">
    <img src="{{cover_image}}" />
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    <div class="post-item-content">
        <a href="{{item_link}}" class="item-title-box">
            <p class="item-title">{{item_title}}</p>
        </a>
        <div class="post-item-user-box">
            <img src="{{user_avatar}}" />
            <p>{{user_name}}</p>
        </div>
        <div class="item-desc-box">
            <p>{{item_desc}}</p>
        </div>
        <div class="item-brand-box">
            <p class="item-brand-text">{{brand_label}}</p>
            <p class="item-brand" {{brand_style_attr}}>{{brand_name}}</p>
        </div>
        <div class="post-item-kind-box">
            <p>{{kind_label}}</p>
            {{item_tags}}
        </div>
    </div>
</div>
