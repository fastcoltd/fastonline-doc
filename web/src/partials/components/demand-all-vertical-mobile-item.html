<article class="demand-all-vertical-mobile-item">
    <div class="demand-all-vertical-mobile-card">
        <a href="{{item_link}}" target="_self" class="demand-all-vertical-mobile-title">{{item_title}}</a>
        <div class="demand-all-vertical-mobile-meta">
            <div class="demand-all-vertical-mobile-chip demand-all-vertical-mobile-brand">
                <img class="demand-all-vertical-mobile-icon" src="image/brand.png" alt="brand icon" />
                <span class="demand-all-vertical-mobile-brand-text" style="color: {{brand_color}};">{{brand_name}}</span>
            </div>
            <div class="demand-all-vertical-mobile-chip demand-all-vertical-mobile-service">
                <img class="demand-all-vertical-mobile-icon" src="image/service.png" alt="service icon" />
                <span class="demand-all-vertical-mobile-service-text">{{service_name}}</span>
            </div>
            <p class="demand-all-vertical-mobile-stat"><span class="demand-all-vertical-mobile-stat-label">Quantity:</span><span
                    class="demand-all-vertical-mobile-stat-value"> {{quantity}}</span></p>
            <p class="demand-all-vertical-mobile-stat"><span class="demand-all-vertical-mobile-stat-label">Total price:</span><span
                    class="demand-all-vertical-mobile-stat-value"> {{total_price}}</span></p>
            <div class="demand-all-vertical-mobile-date">
                <img class="demand-all-vertical-mobile-icon" src="image/date-range.png" alt="date icon" />
                <span class="demand-all-vertical-mobile-date-text">{{bidding_time}}</span>
            </div>
            <div class="demand-all-vertical-mobile-tags">
                <a class="item-tag" href="attribute-all.html?type=demand&name=demand-name&value=demand-value" target="_self"><span
                        class="item-tag-text">Color : Red</span></a>
                <a class="item-tag" href="attribute-all.html?type=demand&name=demand-name&value=demand-value" target="_self"><span
                        class="item-tag-text">Color : Red</span></a>
                <a class="item-tag" href="attribute-all.html?type=demand&name=demand-name&value=demand-value" target="_self"><span
                        class="item-tag-text">Country ：US</span></a>
                <span class="demand-all-vertical-mobile-tags-more">+3</span>
            </div>
            <div class="demand-all-vertical-mobile-bidder">
                <span class="demand-all-vertical-mobile-bidder-icon" aria-hidden="true"></span>
                <div class="demand-all-vertical-mobile-avatar-group">
                    <img class="demand-all-vertical-mobile-avatar" src="image/figma-demand-avatar-01.png" alt="Bidder avatar 1" />
                    <img class="demand-all-vertical-mobile-avatar" src="image/figma-demand-avatar-02.jpg" alt="Bidder avatar 2" />
                    <img class="demand-all-vertical-mobile-avatar" src="image/figma-demand-avatar-03.png" alt="Bidder avatar 3" />
                    <img class="demand-all-vertical-mobile-avatar" src="image/figma-demand-avatar-04.png" alt="Bidder avatar 4" />
                    <img class="demand-all-vertical-mobile-avatar" src="image/figma-demand-avatar-05.png" alt="Bidder avatar 5" />
                    <img class="demand-all-vertical-mobile-avatar" src="image/figma-demand-avatar-06.jpg" alt="Bidder avatar 6" />
                    <span class="demand-all-vertical-mobile-avatar-more">+2</span>
                </div>
            </div>
        </div>
        <button type="button" class="demand-all-vertical-mobile-button {{button_disabled_class}}">{{button_text}}</button>
    </div>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin demand-all-vertical-mobile-like","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
