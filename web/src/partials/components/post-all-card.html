<article class="post-all-card {{post_card_context_class}}" style="--post-brand-color: {{brand_color}};">
    <figure>
        <img src="{{cover_image}}" alt="{{cover_alt}}" />
    </figure>
    <section>
        <header>
            <h2><a href="{{item_link}}" target="_self"><span>{{item_title}}</span></a></h2>
        </header>
        <section data-role="author">
            <img src="{{author_avatar}}" alt="{{author_avatar_alt}}" />
            <p>{{author_name}}</p>
        </section>
        <p data-role="summary">{{summary}}</p>
        <dl data-role="brand">
            <div>
                <dt>{{brand_label}}</dt>
                <dd>{{brand_name}}</dd>
            </div>
        </dl>
        <nav aria-label="Post attributes">
            <span data-role="label">{{kind_label}}</span>
            {{item_tags}}
        </nav>
    </section>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
