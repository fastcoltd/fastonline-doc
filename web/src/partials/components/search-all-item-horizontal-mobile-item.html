<div class="search-card search-card-first-item search-card-first-item-mobile">
    <article class="item-all-horizontal-mobile-item search-all-item-mobile-item">
        <div class="item-all-horizontal-mobile-card">
            <div class="item-all-horizontal-mobile-media">
                <img class="item-all-horizontal-mobile-cover" src="image/best-item-cover.png" alt="item cover" />
            </div>
            <div class="item-all-horizontal-mobile-main">
                <a href="{{item_link}}" target="_self" class="search-all-item-mobile-title-row item-all-horizontal-mobile-title">
                    <span class="item-mark item-all-horizontal-mobile-mark" style="{{mark_style}}">{{mark_text}}</span>
                    <span class="search-all-item-mobile-title-text">{{item_title}}</span>
                </a>
                <div class="item-all-horizontal-mobile-meta">
                    <!-- @include ./rating-with-count-mobile.html {"score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
                    <div class="item-all-horizontal-mobile-brand">
                        <img class="item-all-horizontal-mobile-meta-icon" src="image/brand.png" alt="brand icon" />
                        <span class="item-all-horizontal-mobile-brand-text" style="color: {{brand_color}};">{{brand_name}}</span>
                    </div>
                    <div class="item-all-horizontal-mobile-service">
                        <img class="item-all-horizontal-mobile-meta-icon" src="image/service.png" alt="service icon" />
                        <span class="item-all-horizontal-mobile-service-text">{{service_name}}</span>
                    </div>
                    <span class="item-all-horizontal-mobile-price">$325.00</span>
                    <div class="item-all-horizontal-mobile-stock">
                        <img class="item-all-horizontal-mobile-meta-icon" src="image/stock.png" alt="stock icon" />
                        <span class="item-all-horizontal-mobile-stock-text">52</span>
                    </div>
                </div>
                <button type="button" class="item-all-horizontal-mobile-buy-btn {{item_button_class}}">BUY NOW</button>
            </div>
        </div>
        <!-- @include ./item-like-button.html {"like_class":"icon-aixin item-all-horizontal-mobile-like","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    </article>
</div>
