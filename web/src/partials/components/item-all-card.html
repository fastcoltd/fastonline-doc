<article class="item-all-card {{item_card_state_class}}">
    <figure>
        <img src="image/best-item-cover.png" alt="item cover" />
    </figure>
    <section>
        <header>
            <span data-role="mark" style="{{mark_style}}">{{mark_text}}</span>
            <h2><a href="{{item_link}}" target="_self">{{item_title}}</a></h2>
        </header>
        <div data-role="meta">
            <div data-role="rating">
                <!-- @include ./rating-with-count.html {"score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
            </div>
            <dl>
                <div data-field="brand">
                    <dt>Brand：</dt>
                    <dd>
                        <img src="image/brand.png" alt="brand icon" />
                        <span style="color: {{brand_color}};">{{brand_name}}</span>
                    </dd>
                </div>
                <div data-field="service">
                    <dt>Service：</dt>
                    <dd>
                        <img src="image/service.png" alt="service icon" />
                        <span>{{service_name}}</span>
                    </dd>
                </div>
                <div data-field="price">
                    <dt>Price：</dt>
                    <dd>$325.00</dd>
                </div>
                <div data-field="stock">
                    <dt>In stock：</dt>
                    <dd>
                        <img src="image/stock.png" alt="stock icon" />
                        <span>52</span>
                    </dd>
                </div>
            </dl>
        </div>
        <nav aria-label="Item tags">
            {{item_tags}}
        </nav>
        <footer>
            <button type="button" class="{{item_button_class}}">BUY NOW</button>
        </footer>
    </section>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
