<article class="demand-all-card" style="--demand-brand-color: {{brand_color}};">
    <header>
        <h2><a href="{{item_link}}" target="_self">{{item_title}}</a></h2>
    </header>
    <dl data-role="details">
        <div data-field="brand">
            <dt><img src="image/brand.png" alt="" aria-hidden="true" /><span>Brand:</span></dt>
            <dd>{{brand_name}}</dd>
        </div>
        <div data-field="service">
            <dt><img src="image/service.png" alt="" aria-hidden="true" /><span>Service:</span></dt>
            <dd>{{service_name}}</dd>
        </div>
        <div data-field="quantity">
            <dt>Quantity:</dt>
            <dd>{{quantity}}</dd>
        </div>
        <div data-field="total-price">
            <dt>Total price:</dt>
            <dd>{{total_price}}</dd>
        </div>
        <div data-field="price-range">
            <dt>Price range:</dt>
            <dd>{{price_range}}</dd>
        </div>
        <div data-field="bidding-time">
            <dt><img src="image/date-range.png" alt="Bidding time" /></dt>
            <dd>{{bidding_time}}</dd>
        </div>
    </dl>
    <section data-role="bidders">
        <span data-role="bidder-icon" aria-hidden="true"></span>
        <span data-role="label">Bidder：</span>
        <div data-role="avatars">
            {{bidders_html}}
            <span data-role="more">{{bidder_more}}</span>
        </div>
    </section>
    <nav aria-label="Demand attributes">
        {{item_tags}}
    </nav>
    <button type="button" class="demand-button {{button_disabled_class}}" aria-disabled="{{button_aria_disabled}}">{{button_text}}</button>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
