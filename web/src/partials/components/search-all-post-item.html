<div class="search-card {{card_class}} search-card-third-item-desktop">
  <div class="item-title-wrapper">
    <div class="item-title">{{title_prefix}}<span>{{title_highlight}}</span>{{title_suffix}}
    </div>
    <!-- @include ./item-like-button.html {"like_class":"{{like_class}}","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"{{like_alt}}","aria_label":"{{aria_label}}","aria_pressed":"{{aria_pressed}}"} -->
  </div>
  <div class="search-card-content">
    <img src="{{image_src}}" alt="{{image_alt}}">
    <div class="card-content">
      <p>{{summary_text}}</p>
      <div class="best-items-item-middle-box search-post-meta">
        <div class="item-stock-box">
          <p class="item-stock-text">{{time_label}}</p>
          <p class="item-stock">{{time_value}}</p>
        </div>
        <div class="item-stock-box">
          <p class="item-stock-text">{{brand_label}}</p>
          <p class="item-stock">{{brand_value}}</p>
        </div>
      </div>
    </div>
  </div>
  <div class="status-badge status-badge1" style="{{status_badge_style}}">
    <p>{{status_text}}</p>
  </div>
</div>
<div class="search-card search-card-third-item search-card-third-item-mobile">
  <div class="layout-horizontal search-all-post-mobile-layout">
    <!-- @include ./post-shared-item.html {"post_item_extra_class":"{{post_item_extra_class}}","cover_image":"{{cover_image}}","like":"{{post_like}}","like_icon":"{{post_like_icon}}","aria_pressed":"{{post_aria_pressed}}","item_link":"{{post_item_link}}","item_title":"{{post_item_title}}","user_avatar":"{{post_user_avatar}}","user_name":"{{post_user_name}}","item_desc":"{{post_item_desc}}","brand_label":"{{post_brand_label}}","brand_style_attr":"{{post_brand_style_attr}}","brand_name":"{{post_brand_name}}","kind_label":"{{post_kind_label}}","item_tags":"{{post_item_tags}}"} -->
  </div>
</div>
