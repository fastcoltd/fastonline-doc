<div class="item-all-filter-container common-filter-panel {{panel_extra_class}}">
<header class="filter-header" aria-label="Filter header">
    <div class="filter-header-nav">
        <button class="filter-back-btn" type="button" aria-label="Back">
            <span class="filter-back-icon" aria-hidden="true"></span>
        </button>
        <h2 class="filter-title">Filters</h2>
        <button class="filter-clear-btn" type="button">Clear all</button>
    </div>
</header>
<header class="item-all-filter-mobile-head" aria-label="Filter summary">
    <div class="item-all-filter-mobile-count">
        <img class="page-filter-icon" src="image/filter-tight.png" alt="Filter" />
        <p class="page-filter-num">({{filter_count}})</p>
    </div>
    <div class="layout-controls-box" role="tablist" aria-label="Layout switch">
        <div class="layout-switch active" data-layout="vertical">Vertical display</div>
        <div class="layout-switch" data-layout="horizontal">Horizontal display</div>
    </div>
</header>

<div class="layout-controls-box" role="tablist" aria-label="Layout switch">
    <div class="layout-switch active" data-layout="vertical">Vertical display</div>
    <div class="layout-switch" data-layout="horizontal">Horizontal display</div>
</div>

<main class="filter-content" aria-label="Filter form">
    <section class="filter-group">
        <div class="filter-group-header">
            <h2 class="filter-group-title">Name (Keywords)</h2>
            <div class="filter-expand-icon">
                <i class="iconfont icon-arrow_up"></i>
            </div>
        </div>
        <div class="filter-group-content">
            <div class="filter-input-wrapper">
                <input type="text" class="filter-input name-input" placeholder="Input name" />
            </div>
        </div>
    </section>

    <div class="filter-divider"></div>

    <section class="filter-group filter-group-bottom-half">
        <div class="filter-group-header">
            <h2 class="filter-group-title">Brand</h2>
            <div class="filter-expand-icon">
                <i class="iconfont icon-arrow_up"></i>
            </div>
        </div>
        <div class="filter-group-content">
            <div class="filter-custom-select filter-custom-select-count" data-value="" data-type="brand">
                <div class="filter-custom-select-trigger">
                    <span class="filter-custom-select-text placeholder">Select Brand</span>
                    <div class="filter-select-arrow">
                        <i class="iconfont icon-arrow_up"></i>
                    </div>
                </div>
                <div class="filter-dropdown-panel">
                    <div class="filter-dropdown-content"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="filter-group filter-group-top-half">
        <div class="filter-group-header">
            <h2 class="filter-group-title">Service</h2>
            <div class="filter-expand-icon">
                <i class="iconfont icon-arrow_up"></i>
            </div>
        </div>
        <div class="filter-group-content">
            <div class="filter-custom-select filter-custom-select-count" data-value="" data-type="service">
                <div class="filter-custom-select-trigger">
                    <span class="filter-custom-select-text placeholder">Select service</span>
                    <div class="filter-select-arrow">
                        <i class="iconfont icon-arrow_up"></i>
                    </div>
                </div>
                <div class="filter-dropdown-panel">
                    <div class="filter-dropdown-content"></div>
                </div>
            </div>
        </div>
    </section>

    <div class="filter-divider"></div>

    <section class="filter-group">
        <div class="filter-group-header">
            <h2 class="filter-group-title">Tag</h2>
            <div class="filter-expand-icon">
                <i class="iconfont icon-arrow_up"></i>
            </div>
        </div>
        <div class="filter-group-content">
            <div class="filter-custom-select multiselect" data-value="" data-type="tag">
                <div class="filter-custom-select-trigger">
                    <span class="filter-custom-select-text placeholder">Select tag</span>
                    <div class="filter-select-arrow">
                        <i class="iconfont icon-arrow_up"></i>
                    </div>
                </div>
                <div class="filter-dropdown-panel">
                    <div class="filter-dropdown-content"></div>
                </div>
            </div>
            <div class="filter-tags"></div>
        </div>
    </section>

    <div class="filter-divider"></div>

    <section class="filter-group">
        <div class="filter-group-header">
            <h2 class="filter-group-title">Attributes</h2>
            <div class="filter-expand-icon">
                <i class="iconfont icon-arrow_up"></i>
            </div>
        </div>
        <div class="filter-group-content filter-group-content-attr">
            <div class="filter-custom-select" data-value="" data-type="attribute-name">
                <div class="filter-custom-select-trigger">
                    <span class="filter-custom-select-text placeholder">select attribute</span>
                    <div class="filter-select-arrow">
                        <i class="iconfont icon-arrow_up"></i>
                    </div>
                </div>
                <div class="filter-dropdown-panel">
                    <div class="filter-dropdown-content"></div>
                </div>
            </div>
            <div class="filter-custom-select multiselect" data-value="" data-type="attribute-value">
                <div class="filter-custom-select-trigger">
                    <span class="filter-custom-select-text placeholder">select value</span>
                    <div class="filter-select-arrow">
                        <i class="iconfont icon-arrow_up"></i>
                    </div>
                </div>
                <div class="filter-dropdown-panel">
                    <div class="filter-dropdown-content"></div>
                </div>
            </div>
            <div class="filter-attrs"></div>
        </div>
    </section>

    <div class="filter-divider"></div>

    <section class="filter-group">
        <div class="filter-group-header">
            <h2 class="filter-group-title">Price</h2>
            <div class="filter-expand-icon">
                <i class="iconfont icon-arrow_up"></i>
            </div>
        </div>
        <div class="filter-group-content">
            <div class="filter-range-wrapper">
                <div class="filter-price-input">
                    <input type="number" class="filter-input price-input price-input-min" placeholder="Min" min="0"
                        step="0.01" />
                    <div class="filter-currency-icon" aria-hidden="true">
                        <svg class="filter-spinner-svg" width="12" height="12" viewBox="0 0 12 12" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path class="spinner-icon-down"
                                d="M9.09834 7H2.90174C2.71588 7 2.61211 7.19624 2.72721 7.33021L5.8255 10.9229C5.91419 11.0257 6.08495 11.0257 6.17458 10.9229L9.27288 7.33021C9.38798 7.19624 9.2842 7 9.09834 7Z" />
                            <path class="spinner-icon-up"
                                d="M2.90166 6L9.09826 6C9.28412 6 9.38789 5.80376 9.27279 5.66979L6.1745 2.07713C6.08581 1.97429 5.91505 1.97429 5.82542 2.07713L2.72712 5.66979C2.61202 5.80376 2.7158 6 2.90166 6Z" />
                        </svg>
                    </div>
                </div>
                <div class="filter-range-separator"></div>
                <div class="filter-price-input">
                    <input type="number" class="filter-input price-input price-input-max" placeholder="Max" min="0"
                        step="0.01" />
                    <div class="filter-currency-icon" aria-hidden="true">
                        <svg class="filter-spinner-svg" width="12" height="12" viewBox="0 0 12 12" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path class="spinner-icon-down"
                                d="M9.09834 7H2.90174C2.71588 7 2.61211 7.19624 2.72721 7.33021L5.8255 10.9229C5.91419 11.0257 6.08495 11.0257 6.17458 10.9229L9.27288 7.33021C9.38798 7.19624 9.2842 7 9.09834 7Z" />
                            <path class="spinner-icon-up"
                                d="M2.90166 6L9.09826 6C9.28412 6 9.38789 5.80376 9.27279 5.66979L6.1745 2.07713C6.08581 1.97429 5.91505 1.97429 5.82542 2.07713L2.72712 5.66979C2.61202 5.80376 2.7158 6 2.90166 6Z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="filter-divider"></div>

    <section class="filter-group">
        <div class="filter-group-header">
            <h2 class="filter-group-title">inventory</h2>
            <div class="filter-expand-icon">
                <i class="iconfont icon-arrow_up"></i>
            </div>
        </div>
        <div class="filter-group-content">
            <div class="filter-range-wrapper">
                <div class="filter-number-input">
                    <input type="number" class="filter-input number-input number-input-min" placeholder="Min" min="0"
                        step="1" />
                    <div class="filter-number-icon" aria-hidden="true">
                        <svg class="filter-spinner-svg" width="12" height="12" viewBox="0 0 12 12" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path class="spinner-icon-down"
                                d="M9.09834 7H2.90174C2.71588 7 2.61211 7.19624 2.72721 7.33021L5.8255 10.9229C5.91419 11.0257 6.08495 11.0257 6.17458 10.9229L9.27288 7.33021C9.38798 7.19624 9.2842 7 9.09834 7Z" />
                            <path class="spinner-icon-up"
                                d="M2.90166 6L9.09826 6C9.28412 6 9.38789 5.80376 9.27279 5.66979L6.1745 2.07713C6.08581 1.97429 5.91505 1.97429 5.82542 2.07713L2.72712 5.66979C2.61202 5.80376 2.7158 6 2.90166 6Z" />
                        </svg>
                    </div>
                </div>
                <div class="filter-range-separator"></div>
                <div class="filter-number-input">
                    <input type="number" class="filter-input number-input number-input-max" placeholder="Max" min="0"
                        step="1" />
                    <div class="filter-number-icon" aria-hidden="true">
                        <svg class="filter-spinner-svg" width="12" height="12" viewBox="0 0 12 12" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path class="spinner-icon-down"
                                d="M9.09834 7H2.90174C2.71588 7 2.61211 7.19624 2.72721 7.33021L5.8255 10.9229C5.91419 11.0257 6.08495 11.0257 6.17458 10.9229L9.27288 7.33021C9.38798 7.19624 9.2842 7 9.09834 7Z" />
                            <path class="spinner-icon-up"
                                d="M2.90166 6L9.09826 6C9.28412 6 9.38789 5.80376 9.27279 5.66979L6.1745 2.07713C6.08581 1.97429 5.91505 1.97429 5.82542 2.07713L2.72712 5.66979C2.61202 5.80376 2.7158 6 2.90166 6Z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="filter-footer">
    <button class="filter-apply-btn" type="button">Apply</button>
</footer>
</div>
