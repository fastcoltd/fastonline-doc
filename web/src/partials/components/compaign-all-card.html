<article class="compaign-all-card {{compaign_card_state_class}}">
    <figure>
        <img src="{{cover_src}}" alt="{{cover_alt}}" />
    </figure>
    <section>
        <header>
            <a href="{{item_link}}" target="_self">
                <span data-role="mark">{{ad_text}}</span>
                <h2>{{item_title}}</h2>
            </a>
        </header>
        <dl data-role="statistics" aria-label="Campaign statistics">
            <div data-field="items">
                <dt>{{items_label}}</dt>
                <dd>&nbsp;{{items_value}}</dd>
            </div>
            <div data-field="sales">
                <dt>{{sales_label}}</dt>
                <dd>&nbsp;{{sales_value}}</dd>
            </div>
            <div data-field="orders">
                <dt>{{orders_label}}</dt>
                <dd>&nbsp;{{orders_value}}</dd>
            </div>
            <div data-field="favorites">
                <dt>{{favorites_label}}</dt>
                <dd>&nbsp;{{favorites_value}}</dd>
            </div>
        </dl>
        <p data-role="products">
      <span data-role="label">{{products_label}}</span> <span data-role="value">&nbsp;{{products_text}}</span>
        </p>
        <nav aria-label="Campaign tags">
            {{item_tags}}
        </nav>
    </section>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
