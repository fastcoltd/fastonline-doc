<div class="item-detail-review-item {{review_item_extra_class}}">
  <div class="page-section item-detail-review-card">
    <div class="flex-column item-detail-review-box">
      <div class="flex-row item-detail-review-user-box">
        <img src="{{review_user_avatar}}" />
        <div class="flex-column item-detail-review-user-name-box">
          <span>{{review_user_name}}</span>
          <span>{{review_user_time}}</span>
        </div>
        <div class="flex-row item-detail-review-user-status-box">
          <img src="{{review_status_icon}}" />
          <span>{{review_status_text}}</span>
        </div>
      </div>
      <span>{{review_content}}</span>
      <!-- @include ./rating-score-only.html {"score":"{{rating_score}}"} -->
      <div class="flex-row item-detail-review-info-box">
        <div class="flex-column item-detail-review-info-item">
          <span>{{review_price}}</span>
          <span>Price</span>
        </div>
        <div class="item-detail-review-info-line"></div>
        <div class="flex-column item-detail-review-info-item">
          <span>{{review_quantity}}</span>
          <span>Quantity</span>
        </div>
        <div class="item-detail-review-info-line"></div>
        <div class="flex-column item-detail-review-info-item icon">
          <img src="{{review_info_icon}}" />
        </div>
      </div>
    </div>
    <div class="item-detail-review-line"></div>
    <div class="flex-column item-detail-reiviewer-box">
      <div class="flex-row item-detail-reviewer-user-box">
        <img src="{{reviewer_avatar}}" />
        <span>{{reviewer_name}}</span>
        <div></div>
        <img src="image/detailpage/arrow-down.png" style="{{reviewer_arrow_style}}" />
      </div>
      <span style="{{reviewer_content_style}}">{{reviewer_content}}</span>
    </div>
  </div>
  <div class="flex-row item-detail-review-tool-box">
    <span>Helpful?</span>
    <div class="flex-row item-detail-review-tool-item {{helpful_yes_class}}" data-action="yes">
      <img src="{{helpful_yes_icon}}" />
      <i class="iconfont icon-dianzan"></i>
      <span>Yes</span>
    </div>
    <div class="flex-row item-detail-review-tool-item {{helpful_no_class}}" data-action="no">
      <img src="{{helpful_no_icon}}" />
      <i class="iconfont icon-dianzan icon-not-dianzan"></i>
      <span>No</span>
    </div>
  </div>
</div>
