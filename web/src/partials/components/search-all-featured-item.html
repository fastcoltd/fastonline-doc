<div class="search-card {{card_class}}">
  <div class="item-title-wrapper">
    <div class="item-title-main">
      <div class="item-mark" style="{{mark_style}}">{{mark_text}}</div>
      <div class="item-title">{{item_title}}</div>
    </div>
    <!-- @include ./item-like-button.html {"like_class":"{{like_class}}","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"{{like_alt}}","aria_label":"{{aria_label}}","aria_pressed":"{{aria_pressed}}"} -->
  </div>
  <div class="search-card-content">
    <img src="{{image_src}}" class="card-item-img" alt="{{image_alt}}">
    <div class="card-content">
      <!-- @include ./rating-with-count.html {"width":"{{rating_width}}","score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
      <div class="best-items-item-middle-box">
        <div class="item-brand-box">
          <p class="item-brand-text">{{brand_label}}</p>
          <p class="item-brand" style="color: {{brand_color}};">{{brand_name}}</p>
        </div>
        <div class="item-service-box">
          <p class="item-service-text">{{service_label}}</p>
          <p class="item-service">{{service_name}}</p>
        </div>
        <div class="item-price-box">
          <p class="item-price-text">{{price_label}}</p>
          <p class="item-price">{{price_value}}</p>
        </div>
        <div class="item-stock-box">
          <p class="item-stock-text">{{stock_label}}</p>
          <p class="item-stock">{{stock_value}}</p>
        </div>
      </div>
      <div class="item-tag-box">
        {{item_tags}}
      </div>
      <div class="view-info-wrapper">
        <span class="view-info-item">
          <img src="image/view-count.png" class="view-count" alt="">
          <span class="count">{{view_count}}</span>
        </span>
        <span class="view-info-item">
          <i class="iconfont icon-pinglun"></i>
          <span class="count">{{comment_count}}</span>
        </span>
        <span class="view-info-item">
          <img src="image/follow-count.png" class="like-count" alt="">
          <span class="count">{{favorite_count}}</span>
        </span>
      </div>
    </div>
    <div class="buy-btn item-buy-btn">{{buy_text}}</div>
  </div>
  <div class="status-badge status-badge1" style="{{status_badge_style}}">
    <p>{{status_text}}</p>
  </div>
</div>
