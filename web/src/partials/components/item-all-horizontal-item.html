<article class="item-all-horizontal-item">
    <img class="item-all-horizontal-item-cover" src="image/best-item-cover.png" alt="item cover" />
    <div class="item-all-horizontal-item-main">
        <div class="item-all-horizontal-item-top">
            <div class="item-title-box item-all-horizontal-item-title-box">
                <div class="item-mark" style="{{mark_style}}">{{mark_text}}</div>
                <a href="{{item_link}}" target="_self" class="item-title">{{item_title}}</a>
            </div>
            <div class="item-all-horizontal-item-actions">
                <button type="button" class="item-all-horizontal-buy-btn {{item_button_class}}">BUY NOW</button>
                <!-- @include ./item-like-button.html {"like_class":"item-all-horizontal-item-like","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
            </div>
        </div>
        <div class="item-all-horizontal-item-row item-all-horizontal-item-row-rating">
            <!-- @include ./rating-with-count.html {"width":"{{rating_width}}","score":"{{rating_score}}","recommend":"{{rating_recommend}}"} -->
        </div>
        <div class="item-all-horizontal-item-row item-all-horizontal-item-row-meta">
            <div class="item-brand-box">
                <p class="item-brand-text">Brand：</p>
                <p class="item-brand" style="color: {{brand_color}};">{{brand_name}}</p>
            </div>
            <div class="item-service-box">
                <p class="item-service-text">Service：</p>
                <p class="item-service">{{service_name}}</p>
            </div>
            <div class="item-price-box item-all-horizontal-price-box">
                <p class="item-price-text">Price：</p>
                <p class="item-price">$325.00</p>
            </div>
            <div class="item-stock-box item-all-horizontal-stock-box">
                <p class="item-stock-text">In stock：</p>
                <p class="item-stock">52</p>
            </div>
        </div>
        <div class="item-tag-box item-all-horizontal-item-tags">
            {{item_tags}}
        </div>
    </div>
</article>
