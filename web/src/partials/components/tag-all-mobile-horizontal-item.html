<article class="tag-mobile-horizontal-item">
    <div class="tag-mobile-horizontal-item-media">
        <img class="tag-mobile-horizontal-item-cover" src="image/best-item-cover.png" alt="item cover" />
        <div class="tag-mobile-horizontal-item-mark" style="{{mark_style}}">{{mark_text}}</div>
    </div>
    <div class="tag-mobile-horizontal-item-main">
        <div class="tag-mobile-horizontal-item-top">
            <a href="{{item_link}}" target="_self" class="tag-mobile-horizontal-item-title">{{item_title}}</a>
            <img class="tag-mobile-horizontal-item-like" src="{{like_icon}}" alt="收藏按钮" aria-label="收藏" aria-pressed="{{aria_pressed}}" />
        </div>
        <div class="tag-mobile-horizontal-item-rating">
            <img class="tag-mobile-horizontal-item-star" src="image/star.png" alt="star" />
            <span class="tag-mobile-horizontal-item-score">{{rating_score}}</span>
            <span class="tag-mobile-horizontal-item-recommend">{{rating_recommend}}</span>
            <span class="tag-mobile-horizontal-item-verified">B</span>
            <span class="tag-mobile-horizontal-item-brand" style="color: {{brand_color}};">{{brand_name}}</span>
        </div>
        <div class="tag-mobile-horizontal-item-meta">
            <span class="tag-mobile-horizontal-item-service">{{service_name}}</span>
            <span class="tag-mobile-horizontal-item-price">$325.00</span>
            <span class="tag-mobile-horizontal-item-stock">52</span>
        </div>
        <button type="button" class="tag-mobile-horizontal-item-buy-btn {{item_button_class}}">BUY NOW</button>
    </div>
</article>
