<article class="demand-all-horizontal-mobile-item">
    <div class="demand-all-horizontal-mobile-card">
        <a href="{{item_link}}" target="_self">{{item_title}}</a>
        <div class="demand-all-horizontal-mobile-meta">
            <div class="demand-all-horizontal-mobile-chip demand-all-horizontal-mobile-brand">
                <img src="image/brand.png" alt="brand icon" />
                <span style="color: {{brand_color}};">{{brand_name}}</span>
            </div>
            <div class="demand-all-horizontal-mobile-chip demand-all-horizontal-mobile-service">
                <img src="image/service.png" alt="service icon" />
                <span>{{service_name}}</span>
            </div>
            <p><span>Quantity:</span><span
                    > {{quantity}}</span></p>
            <p><span>Total price:</span><span
                    > {{total_price}}</span></p>
            <div class="demand-all-horizontal-mobile-date">
                <img src="image/date-range.png" alt="date icon" />
                <span>{{bidding_time}}</span>
            </div>
        </div>
        <div class="demand-all-horizontal-mobile-tags">
            <a class="item-tag" href="attribute-all.html?type=demand&name=demand-name&value=demand-value" target="_self"><span
                    class="item-tag-text">Color : Red</span></a>
            <a class="item-tag" href="attribute-all.html?type=demand&name=demand-name&value=demand-value" target="_self"><span
                    class="item-tag-text">Color: Red</span></a>
            <a class="item-tag" href="attribute-all.html?type=demand&name=demand-name&value=demand-value" target="_self"><span
                    class="item-tag-text">Country：US</span></a>
            <a class="item-tag" href="attribute-all.html?type=demand&name=demand-name&value=demand-value" target="_self"><span
                    class="item-tag-text">Country：US</span></a>
            <span>+3</span>
        </div>
        <div class="demand-all-horizontal-mobile-bidder">
            <span aria-hidden="true"></span>
            <div class="demand-all-horizontal-mobile-avatar-group">
                <img src="image/figma-demand-avatar-01.png" alt="Bidder avatar 1" />
                <img src="image/figma-demand-avatar-02.jpg" alt="Bidder avatar 2" />
                <img src="image/figma-demand-avatar-03.png" alt="Bidder avatar 3" />
                <img src="image/figma-demand-avatar-04.png" alt="Bidder avatar 4" />
                <span>+2</span>
            </div>
        </div>
        <button type="button" class="{{button_disabled_class}}">{{button_text}}</button>
    </div>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin demand-all-horizontal-mobile-like","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
