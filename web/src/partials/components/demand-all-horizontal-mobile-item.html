<article class="demand-all-horizontal-mobile-item">
    <div class="demand-all-horizontal-mobile-card">
        <a href="{{item_link}}" target="_self" class="demand-all-horizontal-mobile-title">{{item_title}}</a>
        <div class="demand-all-horizontal-mobile-meta">
            <div class="demand-all-horizontal-mobile-chip demand-all-horizontal-mobile-brand">
                <img class="demand-all-horizontal-mobile-icon" src="image/brand.png" alt="brand icon" />
                <span class="demand-all-horizontal-mobile-brand-text" style="color: {{brand_color}};">{{brand_name}}</span>
            </div>
            <div class="demand-all-horizontal-mobile-chip demand-all-horizontal-mobile-service">
                <img class="demand-all-horizontal-mobile-icon" src="image/service.png" alt="service icon" />
                <span class="demand-all-horizontal-mobile-service-text">{{service_name}}</span>
            </div>
            <p class="demand-all-horizontal-mobile-stat"><span class="demand-all-horizontal-mobile-stat-label">Quantity:</span><span
                    class="demand-all-horizontal-mobile-stat-value"> {{quantity}}</span></p>
            <p class="demand-all-horizontal-mobile-stat"><span class="demand-all-horizontal-mobile-stat-label">Total price:</span><span
                    class="demand-all-horizontal-mobile-stat-value"> {{total_price}}</span></p>
            <div class="demand-all-horizontal-mobile-date">
                <img class="demand-all-horizontal-mobile-icon" src="image/date-range.png" alt="date icon" />
                <span class="demand-all-horizontal-mobile-date-text">{{bidding_time}}</span>
            </div>
        </div>
        <div class="demand-all-horizontal-mobile-tags">
            {{tags_html}}
        </div>
        <div class="demand-all-horizontal-mobile-bidder">
            {{bidders_html}}
        </div>
        <button type="button" class="demand-all-horizontal-mobile-button {{button_disabled_class}}">{{button_text}}</button>
    </div>
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin demand-all-horizontal-mobile-like","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
</article>
