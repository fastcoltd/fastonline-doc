<div class="header-search-mobile-box">
    <div class="header-search-mobile-box-label">
        <label class="header-search-mobile-box-label-text">items</label>
        <img class="header-search-mobile-box-label-icon" src="image/more-arrow.png" />
        <div class="header-menu-container">
            <div class="header-menu-selector">
                <ul class="header-menu-list">
                    <li class="header-menu-item" data-value="items">
                        <h2 class="title">items</h2>
                    </li>
                    <li class="header-menu-item" data-value="stories">
                        <h2 class="title">stories</h2>
                    </li>
                    <li class="header-menu-item" data-value="demands">
                        <h2 class="title">demands</h2>
                    </li>
                    <li class="header-menu-item" data-value="posts">
                        <h2 class="title">posts</h2>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class="header-search-mobile-box-line"></div>
    <span class="header-search-mobile-box-input-box">
        <input class="header-search-mobile-box-input-box-input" type="text"
            placeholder="Search for items, stores, demands..." onkeyup="handleEnterFn(event)" />
        <img class="header-search-mobile-box-input-box-icon" src="image/header-search.png"
            onclick="handleSearchFn(event)" />
    </span>
</div>
