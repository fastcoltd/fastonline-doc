<div class="compaign-item figma-hot-compaign-item">
    <img class="compaign-item-icon" src="image/best-item-cover.png" />
    <!-- @include ./item-like-button.html {"like_class":"icon-aixin","like":"{{like}}","like_icon":"{{like_icon}}","like_alt":"收藏按钮","aria_label":"收藏","aria_pressed":"{{aria_pressed}}"} -->
    <div class="compaign-item-content">
        <a href="{{item_link}}" target="_self" class="item-title-box">
            <h4 class="item-title">{{item_title}}</h4>
        </a>
        <div class="compaign-item-middle-box">
            <div class="compaign-item-box">
                <div class="compaign-item-brand-box">
                    <div class="compaign-item-brand-text">{{items_label}}</div>
                    <div class="compaign-item-brand">{{items_value}}</div>
                </div>
                <div class="compaign-item-brand-box">
                    <div class="compaign-item-brand-text">{{sales_label}}</div>
                    <div class="compaign-item-brand">{{sales_value}}</div>
                </div>
            </div>
            <div class="compaign-item-box">
                <div class="compaign-item-brand-box">
                    <div class="compaign-item-brand-text">{{orders_label}}</div>
                    <div class="compaign-item-brand">{{orders_value}}</div>
                </div>
                <div class="compaign-item-brand-box">
                    <div class="compaign-item-brand-text">{{favorites_label}}</div>
                    <div class="compaign-item-brand">{{favorites_value}}</div>
                </div>
            </div>
        </div>
        <div class="compaign-item-products-box">
            <div class="compaign-item-products-text">{{products_label}}</div>
            <p class="compaign-item-products">{{products_text}}</p>
        </div>
        {{item_tags_block}}
    </div>
</div>
