    <script>
        $(function () {
            $('.resource-action-like-icon').on('click', function () {
                $(this).parent('.resource-action-group').toggleClass('has-activate');
                $(this).closest('.faq-actions').find('.resource-action-unlike').removeClass('has-activate');
            });
            $('.resource-action-unlike-icon').on('click', function () {
                $(this).parent('.resource-action-group').toggleClass('has-activate');
                $(this).closest('.faq-actions').find('.resource-action-like').removeClass('has-activate');
            });
            $('#faq-list-grid').on('click', '.faq-header', function () {
                var $item = $(this).closest('.faq-item');
                var $content = $item.find('.faq-content');
                var $arrow = $item.find('.faq-header-arrow-icon');
                $content.slideToggle(200);
                $arrow.toggleClass('open');
            });

            var faqItemHtml = '<div class="faq-item">'
                + '<div class="faq-header">'
                + '<div class="faq-header-icon-box"><img class="faq-header-icon" src="image/brand-adobe-icon.png" /></div>'
                + '<div class="faq-header-middle-box">'
                + '<span class="faq-header-title-tag" style="color: #1E9FDB; border: #1E9FDB solid 0.125rem;">Payment Problems</span>'
                + '<div class="faq-header-title">How do I reset my password?</div>'
                + '</div>'
                + '<img class="faq-header-arrow-icon" src="image/more-arrow.png" />'
                + '</div>'
                + '<div class="faq-content" style="display: none;">'
                + '<div>We supply a series of design principles, practical patterns and high quality design resources (Sketch and Axure), to help people create their produc and see more</div>'
                + '<div class="view-more-wrapper"><a class="view-more-btn" href="faq-detail.html?id=123">more</a></div>'
                + '</div>'
                + '<div class="faq-actions">'
                + '<div class="resource-action-group resource-action-like">'
                + '<img src="image/like-count.png" class="resource-action-icon resource-action-like-icon cursor-pointer" />'
                + '<i class="iconfont icon-dianzan icon-is-dianzan"></i>'
                + '<span class="resource-action-count">20</span>'
                + '</div>'
                + '<div class="resource-action-group resource-action-unlike">'
                + '<img src="image/unlike-count.png" class="resource-action-icon resource-action-unlike-icon cursor-pointer" />'
                + '<i class="iconfont icon-dianzan icon-not-dianzan"></i>'
                + '<span class="resource-action-count">10</span>'
                + '</div>'
                + '<div class="faq-action-group">'
                + '<img src="image/follow-active-count.png" class="faq-action-icon" />'
                + '<span class="faq-action-count">saved</span>'
                + '</div>'
                + '</div>'
                + '</div>';
            var page = 1;
            $('#load-more').on('click', function () {
                var $btn = $(this);
                $btn.addClass('loading');
                setTimeout(function () {
                    for (var i = 0; i < 3; i++) {
                        $('#faq-list-grid').append(faqItemHtml);
                    }
                    $btn.removeClass('loading');
                    page++;
                }, 500);
            });
        });
    </script>
