    <script>
        $(function () {
            function updateFaqListStickyTop() {
                var headerHeight = $('.page-top-sticky-main').outerHeight() || 0;
                document.documentElement.style.setProperty('--faq-list-sticky-top', headerHeight + 'px');
            }

            function searchData() {
                var params = {
                    category: $('#selectedCategory').attr('data-value'),
                    name: $('#searchInput').val(),
                    sortBy: $('.page-sort-box > img').attr('data-value')
                };
                console.log(params);
            }

            updateFaqListStickyTop();
            $(window).on('resize', updateFaqListStickyTop);
            setTimeout(updateFaqListStickyTop, 0);

            $('.page-dropdown-select').on('click', function () {
                $(this).toggleClass('active');
            });
            $('.page-dropdown-item').on('click', function (event) {
                event.stopPropagation();
                var value = $(this).attr('data-value');
                var text = $(this).find('.title').text();
                $('#selectedCategory').attr('data-value', value).text(text);
                $('.page-dropdown-select').removeClass('active');
                searchData();
            });
            $('#page-sort-section').on('click', function () {
                $('#sortDropdown').toggle();
            });
            $('.sort-item').on('click', function (event) {
                event.stopPropagation();
                $('.page-sort-box > img').attr('data-value', $(this).attr('data-value'));
                $('#sortDropdown').hide();
                searchData();
            });
            $('.page-search-icon').on('click', function () {
                searchData();
            });

            $('#faq-list-grid').on('click', '.resource-action-like > img', function () {
                $(this).parent('.resource-action-group').toggleClass('has-activate');
                $(this).closest('.faq-actions').find('.resource-action-unlike').removeClass('has-activate');
            });
            $('#faq-list-grid').on('click', '.resource-action-unlike > img', function () {
                $(this).parent('.resource-action-group').toggleClass('has-activate');
                $(this).closest('.faq-actions').find('.resource-action-like').removeClass('has-activate');
            });
            $('#faq-list-grid').on('click', '.faq-action-save', function () {
                $(this).toggleClass('has-activate');
            });
            $('#faq-list-grid').on('click', '.faq-header', function () {
                var $item = $(this).closest('.faq-item');
                var $content = $item.find('.faq-content');
                var $arrow = $item.find('.faq-header > img');
                $content.slideToggle(200);
                $arrow.toggleClass('open');
            });

            $('#load-more').on('click', function () {
                var $btn = $(this);
                var $loading = $btn.find('.loading');
                var $text = $btn.children('span');
                if ($loading.is(':visible')) return;
                $loading.show();
                $text.hide();
                setTimeout(function () {
                    var $faqList = $('#faq-list-grid');
                    var $items = $faqList.children('.faq-item');
                    var $emptyState = $faqList.children('.no-data-wrapper').first();
                    var nextIndex = $items.length + 1;
                    var $newItems = $items.clone(false, false);

                    $newItems.each(function (index) {
                        var itemIndex = nextIndex + index;
                        var $item = $(this);
                        $item.removeClass('brand-faq-item-expanded');
                        $item.find('.faq-content').hide();
                        $item.find('.faq-header > img').removeClass('open');
                        $item.find('.faq-header-middle-box > div').text('How do I reset my password? ' + itemIndex);
                        $item.find('.faq-content > div:last-child > a').attr('href', 'faq-detail.html?id=' + (123 + itemIndex));
                    });

                    if ($emptyState.length) {
                        $emptyState.before($newItems);
                    } else {
                        $faqList.append($newItems);
                    }

                    $loading.hide();
                    $text.show();
                }, 1500);
            });
        });
    </script>
